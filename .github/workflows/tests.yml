name: tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests
        run: |
          pytest -q

      - name: Enforce Full Src Coverage
        run: |
          mkdir -p tmp
          pytest --cov=src --cov-config=/dev/null --cov-report=term --cov-report=json:tmp/coverage.json --cov-fail-under=85 -q

      - name: Enforce Critical Module Coverage
        run: |
          python scripts/check_module_coverage.py --coverage-json tmp/coverage.json --module src/quality_gate.py=85 --module src/mockup_generator.py=85
