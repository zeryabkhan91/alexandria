services:
  cover-designer:
    build: .
    command: >
      sh -c "exec python3 scripts/quality_review.py --serve --host ${HOST:-0.0.0.0}
      --port ${PORT:-8001} --output-dir \"Output Covers\" --worker-mode ${JOB_WORKER_MODE:-external}"
    ports:
      - "${PORT:-8001}:8001"
    env_file: .env
    environment:
      JOB_WORKER_MODE: "${JOB_WORKER_MODE:-external}"
    volumes:
      - "./Input Covers:/app/Input Covers:ro"
      - "./Output Covers:/app/Output Covers"
      - "./tmp:/app/tmp"
      - "./data:/app/data"
    depends_on:
      cover-designer-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cover-designer-worker:
    build: .
    command: >
      sh -c "exec python3 scripts/job_worker.py --workers ${JOB_WORKERS:-2}"
    env_file: .env
    environment:
      JOB_WORKER_MODE: "external"
    volumes:
      - "./Input Covers:/app/Input Covers:ro"
      - "./Output Covers:/app/Output Covers"
      - "./tmp:/app/tmp"
      - "./data:/app/data"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os,json,sys,pathlib; from datetime import datetime,timezone; p=pathlib.Path(os.getenv('JOB_WORKER_HEARTBEAT_PATH','data/worker_heartbeat.json')); d=json.loads(p.read_text()) if p.exists() else {}; t=d.get('updated_at',''); stale=int(os.getenv('JOB_WORKER_HEARTBEAT_STALE_SECONDS','120')); dt=datetime.fromisoformat(t.replace('Z','+00:00')) if t else None; ok=bool(dt and (datetime.now(timezone.utc)-dt).total_seconds()<=stale); sys.exit(0 if ok else 1)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
